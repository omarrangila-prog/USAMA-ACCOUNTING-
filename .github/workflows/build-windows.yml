name: Build Windows EXE

# Builds the Windows installer (.exe) in the cloud so you don't need a Windows
# machine. Triggers when you push a version tag (e.g. v1.0.0) OR run manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    # Allow the workflow token to create/update GitHub Releases (fixes
    # "Resource not accessible by integration" on the publish step).
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm install (not ci) is more forgiving if the lockfile drifts.
      - name: Install dependencies
        run: npm install

      # Firebase web config is baked into src/firebase/config.ts as a fallback,
      # so the .exe is always connected — no repo secrets required. (You may
      # still set VITE_FIREBASE_* secrets to override for a different project.)
      - name: Build + package Windows installer
        run: npm run electron:build

      - name: Show build output (debug)
        if: always()
        shell: pwsh
        run: |
          Write-Host "Contents of release/:"
          if (Test-Path release) { Get-ChildItem -Recurse release | Select-Object FullName, Length } else { Write-Host "release/ folder was NOT created — build failed" }

      - name: Upload installer as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: warn

      # When triggered by a tag, also attach the .exe to a GitHub Release.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
